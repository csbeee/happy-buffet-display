<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Happy Buffet Display
        Admin v4.5.1

    </title>

    <link
        rel="stylesheet"
        href="./style.css">

</head>

<body>

    <!-- ==========================================
         Header
    =========================================== -->

    <header class="topbar">

        <div>

            <h1>

                행복을 담은 한식뷔페

            </h1>

            <span>

                관리자 v4.5.1 Stable

            </span>

        </div>

        <div class="topButtons">

            <button
                id="previewBtn">

                미리보기

            </button>

            <button
                id="saveBtn"
                class="primary">

                저장

            </button>

        </div>

    </header>

    <!-- ==========================================
         Save Info
    =========================================== -->

    <section class="saveArea">

        <span id="saveInfo">

            저장 기록 없음

        </span>

    </section>

    <!-- ==========================================
         Today Menu
    =========================================== -->

    <main class="page">

        <section
            id="menuContainer"
            class="menuContainer">

        </section>

    </main>

    <!-- ==========================================
         Bottom Toolbar
    =========================================== -->

    <footer class="bottomBar">

        <button
            id="resetBtn">

            초기화

        </button>

        <button
            id="libraryBtn">

            메뉴 라이브러리

        </button>

    </footer>

        <!-- ==========================================
         Library Modal
    =========================================== -->

    <div
        id="libraryModal"
        class="modal">

        <div class="modalBox">

            <div class="modalHeader">

                <h2>

                    메뉴 라이브러리

                </h2>

                <button
                    id="closeLibrary">

                    ✕

                </button>

            </div>

            <div class="libraryHeader">

                <input
                    id="librarySearch"
                    type="text"
                    placeholder="메뉴 검색">

                <button
                    id="libraryAdd"
                    class="primary">

                    + 메뉴 추가

                </button>

            </div>

            <div class="libraryToolbar">

                <select id="libraryCategory">

                    <option value="all">

                        전체

                    </option>

                    <option value="main">

                        메인

                    </option>

                    <option value="soup">

                        국/찌개

                    </option>

                    <option value="side">

                        반찬

                    </option>

                    <option value="kimchi">

                        김치

                    </option>

                    <option value="extra">

                        추가반찬

                    </option>

                    <option value="dessert">

                        후식

                    </option>

                </select>

            </div>

            <div
                id="libraryList"
                class="libraryList">

            </div>

        </div>

    </div>

    <!-- ==========================================
         Menu Editor
    =========================================== -->

    <div
        id="editorModal"
        class="modal">

        <div class="editorModal">

            <h2
                id="editorTitle">

                메뉴 추가

            </h2>

            <div class="editorGroup">

                <label>

                    메뉴명

                </label>

                <input
                    id="menuName"
                    type="text">

            </div>

            <div class="editorGroup">

                <label>

                    카테고리

                </label>

                <select
                    id="menuCategory">

                    <option value="main">

                        메인

                    </option>

                    <option value="soup">

                        국/찌개

                    </option>

                    <option value="side">

                        반찬

                    </option>

                    <option value="kimchi">

                        김치

                    </option>

                    <option value="extra">

                        추가반찬

                    </option>

                    <option value="dessert">

                        후식

                    </option>

                </select>

            </div>

            <div class="editorGroup">

                <label>

                    원가등급

                </label>

                <select
                    id="menuCost">

                    <option value="low">

                        Low

                    </option>

                    <option value="medium">

                        Medium

                    </option>

                    <option value="high">

                        High

                    </option>

                </select>

            </div>

            <div class="editorGroup">

                <label>

                    육류

                </label>

                <select
                    id="menuMeat">

                    <option value="none">없음</option>

                    <option value="pork">돼지고기</option>

                    <option value="beef">소고기</option>

                    <option value="chicken">닭고기</option>

                    <option value="duck">오리고기</option>

                    <option value="fish">생선</option>

                    <option value="seafood">해산물</option>

                    <option value="egg">계란</option>

                    <option value="tofu">두부</option>

                    <option value="mixed">혼합</option>

                </select>

            </div>

            <div class="editorCheck">

                <label>

                    <input
                        id="menuFavorite"
                        type="checkbox">

                    즐겨찾기

                </label>

            </div>

            <div class="editorCheck">

                <label>

                    <input
                        id="menuEnabled"
                        type="checkbox"
                        checked>

                    사용

                </label>

            </div>

            <div class="editorButtons">

                <button
                    id="editorSave"
                    class="primary">

                    저장

                </button>

                <button
                    id="editorDelete"
                    class="danger">

                    삭제

                </button>

                <button
                    id="editorCancel">

                    취소

                </button>

            </div>

        </div>

    </div>

    <!-- ==========================================
         Loading
    =========================================== -->

    <div
        id="loading"
        class="loading hidden">

        <div class="loadingBox">

            저장중...

        </div>

    </div>

    <!-- ==========================================
         Script
    =========================================== -->

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js" crossorigin="anonymous"></script>

    <script
        type="module"
        src="./app.js">

    </script>

</body>

</html>
