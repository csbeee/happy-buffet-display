<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>행복을 담은 한식뷔페</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <!-- 헤더 -->

        <header>

            <h1>🍽 행복을 담은 한식뷔페</h1>

            <div class="subtitle">
                TODAY'S MENU
            </div>

            <div id="date"></div>

            <div id="clock"></div>

        </header>

        <!-- 메뉴 -->

        <main>

            <section class="menu-card">

                <h2>🍲 국</h2>

                <ul id="soup"></ul>

            </section>

            <section class="menu-card">

                <h2>🍖 메인요리</h2>

                <ul id="main"></ul>

            </section>

            <section class="menu-card">

                <h2>🥗 반찬</h2>

                <ul id="side"></ul>

            </section>

            <section class="menu-card">

                <h2>🌶 김치</h2>

                <ul id="kimchi"></ul>

            </section>

            <section class="menu-card">

                <h2>🍉 후식</h2>

                <ul id="dessert"></ul>

            </section>

        </main>

        <!-- 공지 -->

        <section class="notice-card">

            <h2>📢 공지사항</h2>

            <div id="notice"></div>

        </section>

        <!-- Footer -->

        <footer>

            <div id="updatedAt">
                최종 업데이트 : -
            </div>

        </footer>

    </div>

    <script type="module" src="app.js"></script>

</body>

</html>
