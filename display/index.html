<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>행복을 담은 한식뷔페</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- =======================
            HEADER
    ======================== -->

    <header>

        <h1 class="logo">

            행복을 담은 한식뷔페

        </h1>

        <div class="info">

            <span id="date"></span>

            <span id="clock"></span>

        </div>

    </header>

    <!-- =======================
            국
    ======================== -->

    <section
        class="menu-card"
        id="card-soup">

        <div class="menu-title soup">

            <img
                class="category-icon"
                src="../assets/icons/category/soup.svg"
                alt="국">

            <span>국</span>

        </div>

        <ul id="soup"></ul>

    </section>

    <!-- =======================
            메인요리
    ======================== -->

    <section
        class="menu-card"
        id="card-main">

        <div class="menu-title main">

            <img
                class="category-icon"
                src="../assets/icons/category/main.svg"
                alt="메인">

            <span>메인요리</span>

        </div>

        <ul
            id="main"
            class="main-grid">

        </ul>

    </section>

    <!-- =======================
            반찬
    ======================== -->

    <section
        class="menu-card"
        id="card-side">

        <div class="menu-title side">

            <img
                class="category-icon"
                src="../assets/icons/category/side.svg"
                alt="반찬">

            <span>반찬</span>

        </div>

        <ul id="side"></ul>

    </section>

    <!-- =======================
        김치 + 후식
    ======================== -->

    <section class="bottom-row">

        <!-- 김치 -->

        <div
            class="menu-card"
            id="card-kimchi">

            <div class="menu-title kimchi">

                <img
                    class="category-icon"
                    src="../assets/icons/category/kimchi.svg"
                    alt="김치">

                <span>김치</span>

            </div>

            <ul id="kimchi"></ul>

        </div>

        <!-- 후식 -->

        <div
            class="menu-card"
            id="card-dessert">

            <div class="menu-title dessert">

                <img
                    class="category-icon"
                    src="../assets/icons/category/dessert.svg"
                    alt="후식">

                <span>후식</span>

            </div>

            <ul id="dessert"></ul>

        </div>

    </section>

    <!-- =======================
            공지
    ======================== -->

    <section
        class="notice-card"
        id="noticeCard">

        <div class="notice-title">

            <img
                class="category-icon"
                src="../assets/icons/category/notice.svg"
                alt="공지">

            <span>공지사항</span>

        </div>

        <div class="notice-wrap">

            <div id="notice"></div>

        </div>

    </section>

    <!-- =======================
            FOOTER
    ======================== -->

    <footer>

        <div id="updatedAt">

            마지막 저장 : -

        </div>

    </footer>

</div>

<script
    type="module"
    src="app.js">

</script>

</body>

</html>
